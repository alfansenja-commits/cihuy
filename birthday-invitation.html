<title>Kacang 17 Birthday Invitation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    overflow-x: hidden;
  }

  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(20,5,5,0.85);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid rgba(180,30,30,0.25);
  }

  .top-bar h1 {
    font-size: 15px;
    font-weight: 600;
    color: #e8c0b0;
    letter-spacing: 0.5px;
  }

  .page-counter {
    font-size: 13px;
    color: #a06060;
  }

  .nav-btns {
    display: flex;
    gap: 8px;
  }

  .nav-btns button {
    background: rgba(160,40,40,0.3);
    border: 1px solid rgba(180,60,60,0.4);
    color: #e8c0b0;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
  }

  .nav-btns button:hover { background: rgba(180,50,50,0.5); }
  .nav-btns button:active { transform: scale(0.95); }
  .nav-btns button:disabled { opacity: 0.3; cursor: default; }

  .scroll-container {
    margin-top: 68px;
    width: 100%;
    max-width: 480px;
    padding: 20px 16px 40px;
  }

  .page-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(180,60,60,0.2);
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .page-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .page-card img {
    width: 100%;
    display: block;
  }

  .page-label {
    text-align: center;
    font-size: 11px;
    color: #8a4040;
    padding: 8px;
    background: rgba(20,5,5,0.9);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .dots {
    position: fixed;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 100;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(180,60,60,0.3);
    border: 1px solid rgba(180,60,60,0.5);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }

  .dot.active {
    background: #cc3333;
    transform: scale(1.4);
  }

  .scroll-hint {
    text-align: center;
    color: rgba(200,150,150,0.5);
    font-size: 12px;
    padding: 8px;
    animation: bounce 2s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }
</style>
</head>

<div class="dots">
  <div class="dot active" onclick="jumpToPage(1)" title="Halaman 1"></div>
  <div class="dot" onclick="jumpToPage(2)" title="Halaman 2"></div>
  <div class="dot" onclick="jumpToPage(3)" title="Halaman 3"></div>
  <div class="dot" onclick="jumpToPage(4)" title="Halaman 4"></div>
  <div class="dot" onclick="jumpToPage(5)" title="Halaman 5"></div>
</div>

<script>
const cards = document.querySelectorAll('.page-card');
const dots = document.querySelectorAll('.dot');
let currentPage = 1;

const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      const pg = parseInt(e.target.dataset.page);
      currentPage = pg;
      document.getElementById('cur-page').textContent = pg;
      dots.forEach((d, i) => d.classList.toggle('active', i === pg - 1));
      document.getElementById('btn-up').disabled = pg === 1;
      document.getElementById('btn-down').disabled = pg === 5;
      if (pg === 5) document.getElementById('scroll-hint').style.display = 'none';
    }
  });
}, { threshold: 0.4 });

cards.forEach(c => observer.observe(c));

function scrollToPage(dir) {
  const target = currentPage + dir;
  if (target < 1 || target > 5) return;
  jumpToPage(target);
}

function jumpToPage(n) {
  const el = document.getElementById('page-' + n);
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === 'PageDown') scrollToPage(1);
  if (e.key === 'ArrowUp' || e.key === 'PageUp') scrollToPage(-1);
});

// Touch swipe
let touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  const diff = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 50) scrollToPage(diff > 0 ? 1 : -1);
});
</script>
